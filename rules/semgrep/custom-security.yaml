rules:

  - id: hardcoded-password

    patterns:
      - pattern: password = "..."

    message: Hardcoded password detected

    severity: ERROR

    languages:
      - python

    metadata:
      cwe: "CWE-798"
      owasp: "A07:2021-Identification and Authentication Failures"

  - id: dangerous-os-system

    pattern: os.system(...)

    message: Dangerous OS command execution detected

    severity: ERROR

    languages:
      - python

    metadata:
      cwe: "CWE-78"
      owasp: "A03:2021-Injection"

  - id: sql-injection-risk

    patterns:
      - pattern: query = "SELECT ..." + ...

    message: Potential SQL injection via string concatenation

    severity: ERROR

    languages:
      - python

    metadata:
      cwe: "CWE-89"
      owasp: "A03:2021-Injection"

  - id: no-md5

    pattern: hashlib.md5(...)

    message: MD5 is cryptographically broken

    severity: ERROR

    languages:
      - python

    metadata:
      cwe: "CWE-327"
      owasp: "A02:2021-Cryptographic Failures"